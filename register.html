<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ثبت‌نام | KasbOCup</title>
    <link rel="icon" type="image/svg+xml" href="Logo/2.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/gh/rastikerdar/morabba-font@latest/dist/font-face.css" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js" defer></script>
    <script>
        tailwind.config={theme:{extend:{colors:{brand:{red:'#c92c1e',gold:'#e8b84b',dark:'#000000'}},fontFamily:{morabba:['Morabba','Vazirmatn','sans-serif'],vazir:['Vazirmatn','sans-serif'],iransans:['IRANSans','Vazirmatn','sans-serif']}}}}
    </script>
    <link rel="stylesheet" href="styles.css">
    <style>
        .reg-grid{background-image:linear-gradient(rgba(201,44,30,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(201,44,30,.03) 1px,transparent 1px);background-size:80px 80px}
        .reg-glow::before{content:'';position:absolute;top:-200px;left:-150px;width:500px;height:500px;background:radial-gradient(circle,rgba(201,44,30,.1) 0%,transparent 70%);filter:blur(80px);pointer-events:none}
        .reg-glow::after{content:'';position:absolute;bottom:-200px;right:-150px;width:500px;height:500px;background:radial-gradient(circle,rgba(232,184,75,.07) 0%,transparent 70%);filter:blur(80px);pointer-events:none}
        .reg-form-card{background:rgba(255,255,255,0.03);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,0.07);border-radius:20px;position:relative;overflow:hidden}
        .reg-form-card::before{content:'';position:absolute;top:0;right:0;width:100%;height:2px;background:linear-gradient(to left,#e8b84b,#c92c1e,transparent);opacity:.5}
        .form-input{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.07);border-radius:12px;padding:14px 16px;color:#fff;font-size:14px;width:100%;transition:all .3s cubic-bezier(.16,1,.3,1);outline:none;font-family:'Vazirmatn',sans-serif}
        .form-input:focus{border-color:rgba(232,184,75,.5);background:rgba(255,255,255,0.05);box-shadow:0 0 20px rgba(232,184,75,.08)}
        .form-input::placeholder{color:#525252}
        .form-label{display:block;color:rgba(255,255,255,.7);font-size:13px;margin-bottom:8px;font-weight:500}
        .role-card{background:rgba(255,255,255,0.03);border:1.5px solid rgba(255,255,255,0.07);border-radius:16px;padding:20px;cursor:pointer;transition:all .3s cubic-bezier(.16,1,.3,1);position:relative;overflow:hidden}
        .role-card:hover{background:rgba(255,255,255,0.05);border-color:rgba(255,255,255,0.12);transform:translateY(-2px)}
        .role-card.selected{border-color:rgba(232,184,75,.6);background:rgba(232,184,75,.06);transform:translateY(-2px)}
        .role-card.selected::before{content:'';position:absolute;top:0;right:0;width:100%;height:2px;background:linear-gradient(to left,#e8b84b,transparent)}
        .role-card.selected::after{content:'';position:absolute;bottom:-8px;left:15%;right:15%;height:1px;background:linear-gradient(90deg,transparent,rgba(232,184,75,.2),transparent)}
        .member-section{max-height:0;overflow:hidden;transition:max-height .5s cubic-bezier(.16,1,.3,1),opacity .3s ease;opacity:0}
        .member-section.open{max-height:800px;opacity:1}
        .add-member-btn{background:rgba(255,255,255,0.03);border:1.5px dashed rgba(255,255,255,0.1);border-radius:12px;padding:12px;cursor:pointer;transition:all .3s cubic-bezier(.16,1,.3,1);display:flex;align-items:center;justify-content:center;gap:8px;color:rgba(255,255,255,.4);font-size:13px}
        .add-member-btn:hover{border-color:rgba(232,184,75,.4);color:rgba(255,255,255,.7);background:rgba(232,184,75,.04)}
        .member-card{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.07);border-radius:12px;padding:16px;position:relative;transition:all .3s ease}
        .remove-member{position:absolute;top:12px;left:12px;width:28px;height:28px;border-radius:8px;background:rgba(201,44,30,.1);border:none;color:#c92c1e;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s ease}
        .remove-member:hover{background:rgba(201,44,30,.2)}
        .password-toggle{position:absolute;left:12px;top:50%;transform:translateY(-50%);background:none;border:none;color:#525252;cursor:pointer;transition:color .2s ease}
        .password-toggle:hover{color:rgba(255,255,255,.5)}
        .reg-scan-line::after{content:'';position:absolute;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(201,44,30,.15),transparent);animation:scanLine 10s linear infinite;pointer-events:none}
        .reg-vignette{background:radial-gradient(ellipse at 50% 40%,transparent 0%,rgba(0,0,0,.3) 60%,rgba(0,0,0,.8) 100%)}
        .countdown-box::after{content:'';position:absolute;bottom:-8px;left:15%;right:15%;height:1px;background:linear-gradient(90deg,transparent,rgba(232,184,75,.2),transparent)}
    </style>
</head>
<body class="noise">

    <!-- NAV -->
    <nav class="glass-nav fixed top-0 left-0 right-0 z-50 h-20 transition-all duration-300" aria-label="منوی اصلی">
        <div class="max-w-7xl mx-auto px-6 h-full flex items-center justify-between">
            <a href="index.html" class="flex items-center gap-3 group">
                <img src="Logo/2.svg" alt="KasbOCup" class="w-9 h-9 transition-transform duration-300 group-hover:scale-110">
                <span class="font-morabba font-black text-lg text-white">کسب‌وکاپ</span>
            </a>
            <a href="index.html" class="nav-link text-sm transition-colors duration-300 flex items-center gap-2">
                <iconify-icon icon="mdi:arrow-right" width="18"></iconify-icon>
                بازگشت به صفحه اصلی
            </a>
        </div>
    </nav>

    <!-- MAIN -->
    <main class="min-h-screen relative overflow-hidden reg-grid reg-glow">
        <div class="reg-vignette absolute inset-0 pointer-events-none z-[1]"></div>
        <div class="reg-scan-line absolute inset-0 pointer-events-none z-[2]"></div>

        <div class="relative z-10 flex flex-col items-center justify-center min-h-screen pt-24 pb-20 px-6">
            <!-- Logo + Header -->
            <div class="text-center mb-10" style="animation:fadeUp .8s cubic-bezier(.16,1,.3,1) forwards">
                <div class="relative inline-block mb-6">
                    <div class="absolute inset-[-30px] rounded-full" style="background:radial-gradient(circle,rgba(232,184,75,.2) 0%,rgba(201,44,30,.1) 35%,transparent 70%);filter:blur(20px);animation:glowPulse 3s ease-in-out infinite"></div>
                    <img src="Logo/2.svg" alt="KasbOCup" class="relative w-20 h-20 mx-auto" style="animation:floatSlow 5s ease-in-out infinite;filter:drop-shadow(0 0 30px rgba(232,184,75,.4))">
                </div>
                <h1 class="font-morabba font-black text-3xl md:text-4xl text-white mb-3" style="animation:fadeUp .8s cubic-bezier(.16,1,.3,1) .1s both">ثبت‌نام در <span class="text-gold-gradient">کسب‌وکاپ</span></h1>
                <p class="text-sm text-neutral-500 font-iransans" style="animation:fadeUp .8s cubic-bezier(.16,1,.3,1) .2s both">اطلاعات خود را وارد کنید و به رقابت بپیوندید</p>
            </div>

            <!-- Form Card -->
            <div class="reg-form-card w-full max-w-lg p-8 md:p-10" style="animation:fadeUp .8s cubic-bezier(.16,1,.3,1) .3s both">
                <form id="registerForm" class="space-y-5" onsubmit="return false;">
                    <!-- Email -->
                    <div>
                        <label class="form-label flex items-center gap-2">
                            <iconify-icon icon="mdi:email-outline" width="16" class="text-brand-gold opacity-60"></iconify-icon>
                            ایمیل
                        </label>
                        <input type="email" class="form-input" placeholder="example@email.com" required>
                    </div>

                    <!-- Username -->
                    <div>
                        <label class="form-label flex items-center gap-2">
                            <iconify-icon icon="mdi:account-outline" width="16" class="text-brand-gold opacity-60"></iconify-icon>
                            نام کاربری
                        </label>
                        <input type="text" class="form-input" placeholder="نام کاربری خود را وارد کنید" required>
                    </div>

                    <!-- Phone -->
                    <div>
                        <label class="form-label flex items-center gap-2">
                            <iconify-icon icon="mdi:phone-outline" width="16" class="text-brand-gold opacity-60"></iconify-icon>
                            شماره تماس
                        </label>
                        <input type="tel" class="form-input" placeholder="۰۹۱۲۱۲۳۴۵۶۷" dir="ltr" required>
                    </div>

                    <!-- Password -->
                    <div>
                        <label class="form-label flex items-center gap-2">
                            <iconify-icon icon="mdi:lock-outline" width="16" class="text-brand-gold opacity-60"></iconify-icon>
                            رمز عبور
                        </label>
                        <div class="relative">
                            <input type="password" id="password" class="form-input" style="padding-left:44px" placeholder="حداقل ۸ کاراکتر" required>
                            <button type="button" class="password-toggle" onclick="togglePassword()">
                                <iconify-icon icon="mdi:eye-off" width="20" id="eyeIcon"></iconify-icon>
                            </button>
                        </div>
                    </div>

                    <!-- Role Selection -->
                    <div>
                        <label class="form-label flex items-center gap-2 mb-3">
                            <iconify-icon icon="mdi:shield-account-outline" width="16" class="text-brand-gold opacity-60"></iconify-icon>
                            نقش شما
                        </label>
                        <div class="grid grid-cols-2 gap-4">
                            <div class="role-card" onclick="selectRole('leader')" id="roleLeader">
                                <div class="flex items-center gap-3">
                                    <div class="w-11 h-11 rounded-xl bg-brand-gold/10 flex items-center justify-center flex-shrink-0">
                                        <iconify-icon icon="mdi:crown" width="24" class="text-brand-gold"></iconify-icon>
                                    </div>
                                    <div>
                                        <p class="text-white font-semibold text-sm mb-0.5">رهبر تیم</p>
                                        <p class="text-neutral-600 text-xs">مدیریت اعضا</p>
                                    </div>
                                </div>
                            </div>
                            <div class="role-card" onclick="selectRole('member')" id="roleMember">
                                <div class="flex items-center gap-3">
                                    <div class="w-11 h-11 rounded-xl bg-brand-red/10 flex items-center justify-center flex-shrink-0">
                                        <iconify-icon icon="mdi:account-group" width="24" class="text-brand-red"></iconify-icon>
                                    </div>
                                    <div>
                                        <p class="text-white font-semibold text-sm mb-0.5">عضو تیم</p>
                                        <p class="text-neutral-600 text-xs">انتخاب رهبر</p>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Leader Section: Add Members -->
                    <div class="member-section" id="leaderSection">
                        <div class="section-divider mb-4"></div>
                        <div class="flex items-center justify-between mb-4">
                            <label class="form-label mb-0 flex items-center gap-2">
                                <iconify-icon icon="mdi:account-multiple-outline" width="16" class="text-brand-gold opacity-60"></iconify-icon>
                                اعضای تیم
                            </label>
                            <span class="text-xs text-neutral-600 font-mono" id="memberCount">۰ عضو</span>
                        </div>
                        <div id="membersContainer" class="space-y-3"></div>
                        <div class="add-member-btn mt-3" onclick="addMember()">
                            <iconify-icon icon="mdi:plus" width="18"></iconify-icon>
                            افزودن عضو جدید
                        </div>
                    </div>

                    <!-- Member Section: Choose Leader -->
                    <div class="member-section" id="memberSection">
                        <div class="section-divider mb-4"></div>
                        <label class="form-label flex items-center gap-2">
                            <iconify-icon icon="mdi:crown-outline" width="16" class="text-brand-red opacity-60"></iconify-icon>
                            انتخاب رهبر تیم
                        </label>
                        <input type="text" class="form-input" placeholder="نام کاربری رهبر تیم را وارد کنید" id="leaderInput">
                        <p class="text-xs text-neutral-600 mt-2 flex items-center gap-1.5">
                            <iconify-icon icon="mdi:information-outline" width="14"></iconify-icon>
                            نام کاربری رهبر تیم خود را وارد کنید
                        </p>
                    </div>

                    <!-- Submit Button -->
                    <button type="submit" class="w-full btn-gold-premium py-4 rounded-xl font-morabba font-bold text-base text-black relative overflow-hidden" onclick="handleSubmit()">
                        <span class="relative z-10 flex items-center justify-center gap-2">
                            ثبت‌نام
                            <iconify-icon icon="mdi:arrow-left" width="20"></iconify-icon>
                        </span>
                    </button>

                    <p class="text-center text-xs text-neutral-600 mt-4">قبلاً ثبت‌نام کرده‌اید؟ <a href="#" class="text-brand-gold hover:underline transition-colors">ورود</a></p>
                </form>
            </div>

            <!-- Bottom info -->
            <div class="text-center mt-8" style="animation:fadeUp .8s cubic-bezier(.16,1,.3,1) .5s both">
                <div class="inline-flex items-center gap-3 glass-dark rounded-full px-6 py-3">
                    <iconify-icon icon="mdi:shield-check-outline" width="18" class="text-brand-gold"></iconify-icon>
                    <p class="text-xs text-neutral-500">اطلاعات شما کاملاً محرمانه و امن نگهداری می‌شود</p>
                </div>
            </div>
        </div>
    </main>

    <!-- FOOTER -->
    <footer class="relative py-6 border-t border-white/5">
        <div class="max-w-7xl mx-auto px-6">
            <div class="flex flex-col md:flex-row items-center justify-between gap-4">
                <div class="flex items-center gap-3"><img src="Logo/2.svg" alt="KasbOCup" class="w-7 h-7 opacity-50" loading="lazy"><span class="font-morabba font-bold text-neutral-600 text-sm">KasbOCup</span></div>
                <div class="flex items-center gap-3">
                    <a href="https://instagram.com/kasbocup" target="_blank" rel="noopener noreferrer" class="w-9 h-9 rounded-full bg-white/5 flex items-center justify-center text-neutral-600 hover:text-white hover:bg-white/10 transition-all duration-300" aria-label="اینستاگرام"><iconify-icon icon="mdi:instagram" width="18"></iconify-icon></a>
                    <a href="https://t.me/kasbocup" target="_blank" rel="noopener noreferrer" class="w-9 h-9 rounded-full bg-white/5 flex items-center justify-center text-neutral-600 hover:text-white hover:bg-white/10 transition-all duration-300" aria-label="تلگرام"><iconify-icon icon="mdi:telegram" width="18"></iconify-icon></a>
                    <a href="https://linkedin.com/company/kasbocup" target="_blank" rel="noopener noreferrer" class="w-9 h-9 rounded-full bg-white/5 flex items-center justify-center text-neutral-600 hover:text-white hover:bg-white/10 transition-all duration-300" aria-label="لینکدین"><iconify-icon icon="mdi:linkedin" width="18"></iconify-icon></a>
                    <a href="https://x.com/kasbocup" target="_blank" rel="noopener noreferrer" class="w-9 h-9 rounded-full bg-white/5 flex items-center justify-center text-neutral-600 hover:text-white hover:bg-white/10 transition-all duration-300" aria-label="توییتر"><iconify-icon icon="mdi:twitter" width="18"></iconify-icon></a>
                </div>
                <p class="text-[11px] text-neutral-700" data-copyright></p>
            </div>
        </div>
    </footer>

    <script>
        var selectedRole = null;
        var memberIndex = 0;

        function selectRole(role) {
            selectedRole = role;
            document.getElementById('roleLeader').classList.toggle('selected', role === 'leader');
            document.getElementById('roleMember').classList.toggle('selected', role === 'member');
            document.getElementById('leaderSection').classList.toggle('open', role === 'leader');
            document.getElementById('memberSection').classList.toggle('open', role === 'member');
        }

        function addMember() {
            memberIndex++;
            var container = document.getElementById('membersContainer');
            var card = document.createElement('div');
            card.className = 'member-card';
            card.id = 'member-' + memberIndex;
            card.innerHTML =
                '<button type="button" class="remove-member" onclick="removeMember(' + memberIndex + ')"><iconify-icon icon="mdi:close" width="16"></iconify-icon></button>' +
                '<div class="grid grid-cols-1 sm:grid-cols-2 gap-3">' +
                    '<div><label class="form-label text-xs">نام کاربری</label><input type="text" class="form-input" placeholder="نام کاربری" style="padding:10px 12px;font-size:13px" required></div>' +
                    '<div><label class="form-label text-xs">ایمیل</label><input type="email" class="form-input" placeholder="example@email.com" style="padding:10px 12px;font-size:13px" required></div>' +
                    '<div><label class="form-label text-xs">شماره تماس</label><input type="tel" class="form-input" placeholder="۰۹۱۲۱۲۳۴۵۶۷" dir="ltr" style="padding:10px 12px;font-size:13px" required></div>' +
                    '<div><label class="form-label text-xs">رمز عبور</label><input type="password" class="form-input" placeholder="رمز عبور" style="padding:10px 12px;font-size:13px" required></div>' +
                '</div>';
            container.appendChild(card);
            updateMemberCount();
        }

        function removeMember(id) {
            var el = document.getElementById('member-' + id);
            if (el) el.remove();
            updateMemberCount();
        }

        function updateMemberCount() {
            var count = document.getElementById('membersContainer').children.length;
            var persian = count.toString().replace(/\d/g, function(d) { return '۰۱۲۳۴۵۶۷۸۹'[d]; });
            document.getElementById('memberCount').textContent = persian + ' عضو';
        }

        function togglePassword() {
            var input = document.getElementById('password');
            var icon = document.getElementById('eyeIcon');
            if (input.type === 'password') {
                input.type = 'text';
                icon.setAttribute('icon', 'mdi:eye');
            } else {
                input.type = 'password';
                icon.setAttribute('icon', 'mdi:eye-off');
            }
        }

        function handleSubmit() {
            if (!selectedRole) {
                alert('لطفاً نقش خود را انتخاب کنید');
                return;
            }
            alert('ثبت‌نام با موفقیت انجام شد!');
        }

        var copyrightEl = document.querySelector('[data-copyright]');
        if (copyrightEl) {
            var yr = new Date().getFullYear();
            var pe = yr.toString().replace(/\d/g, function(d) { return '۰۱۲۳۴۵۶۷۸۹'[d]; });
            copyrightEl.textContent = '© ' + pe + ' KasbOCup — تمامی حقوق محفوظ است.';
        }
    </script>

</body>
</html>
